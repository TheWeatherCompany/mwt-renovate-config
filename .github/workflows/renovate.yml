name: Renovate (self-hosted, CodeArtifact-aware)

# Hosted Renovate (the app/renovate GitHub App) can't authenticate to our
# private CodeArtifact npm registry - it runs on Mend's own infrastructure
# with no AWS credentials, and CodeArtifact tokens are STS-based with a
# ~12h max TTL, so a static secret in Renovate's own config would go stale
# on its own with no way for Mend's hosted app to refresh it. Every
# Renovate-opened npm PR on these repos was resolving packages via
# registry.npmjs.org instead of CodeArtifact as a result.
#
# This workflow self-hosts Renovate for just the affected repos instead:
# each run assumes a narrowly-scoped OIDC role (renovate-codeartifact-token,
# granted only codeartifact:GetAuthorizationToken/GetRepositoryEndpoint/
# ReadFromRepository on the engage domain/engage-npm repository - see
# mwt-ee-deploy's github-actions-deploy role for contrast, which this
# intentionally does NOT reuse since it also carries Terraform state,
# ECR, and IAM management permissions this workflow doesn't need), fetches
# a FRESH token via `aws codeartifact login`, and hands that .npmrc's
# content to Renovate via RENOVATE_NPMRC. Writing ~/.npmrc to disk alone
# is NOT enough - Renovate's own npm datasource (the lookup that decides
# what version to bump *to*, separate from the actual npm/yarn shell-out
# that regenerates the rest of the lockfile) doesn't read the on-disk
# npmrc, only RENOVATE_NPMRC/hostRules. Confirmed by a first run without
# this: transitive deps resolved through CodeArtifact correctly (via the
# real npm/yarn invocation, which does read ~/.npmrc), but the actual
# bumped package's resolved: URL still came back from registry.npmjs.org.
#
# Avoiding duplicate PRs with the hosted app doesn't need an org-level
# GitHub App installation change: each target repo's own renovate.json
# sets "enabled": false, which the hosted app respects and skips. This
# run overrides that via the global `force` config below (force takes
# precedence over repo-level config), so it still processes them.
#
# PREREQUISITE - secrets.RENOVATE_GITHUB_TOKEN: a PAT (or fine-grained
# token) with contents:write + pull-requests:write on every repo in
# RENOVATE_REPOSITORIES. The default GITHUB_TOKEN is scoped to only this
# repo, not the targets.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6h - comfortably inside CodeArtifact's ~12h token TTL
  workflow_dispatch: {}

permissions:
  id-token: write # required for aws-actions/configure-aws-credentials OIDC
  contents: read

env:
  AWS_REGION: us-west-2
  CODEARTIFACT_DOMAIN: engage
  CODEARTIFACT_OWNER: "372500853281"
  CODEARTIFACT_REPOSITORY: engage-npm

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::372500853281:role/renovate-codeartifact-token
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to CodeArtifact and export the token for Renovate
        run: |
          aws codeartifact login \
            --tool npm \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_OWNER" \
            --repository "$CODEARTIFACT_REPOSITORY" \
            --region "$AWS_REGION"

          TOKEN=$(aws codeartifact get-authorization-token \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_OWNER" \
            --region "$AWS_REGION" \
            --query authorizationToken --output text)
          echo "::add-mask::$TOKEN"

          ENDPOINT=$(aws codeartifact get-repository-endpoint \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_OWNER" \
            --repository "$CODEARTIFACT_REPOSITORY" \
            --format npm \
            --region "$AWS_REGION" \
            --query repositoryEndpoint --output text)
          HOST=$(echo "$ENDPOINT" | sed -E 's#^https?://##')

          {
            echo "RENOVATE_NPMRC<<NPMRC_EOF"
            echo "registry=${ENDPOINT}"
            echo "//${HOST}:_authToken=${TOKEN}"
            echo "always-auth=true"
            echo "NPMRC_EOF"
          } >> "$GITHUB_ENV"

      - uses: renovatebot/github-action@v46.1.20
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_GITHUB_TOKEN }}
          RENOVATE_PLATFORM: github
          RENOVATE_AUTODISCOVER: false
          RENOVATE_REPOSITORIES: >-
            ["TheWeatherCompany/mwt-ee-echo",
            "TheWeatherCompany/mwt-ee-dispatcher",
            "TheWeatherCompany/mwt-ee-helios",
            "TheWeatherCompany/mwt-ee-sonar",
            "TheWeatherCompany/mwt-ee-engage-shared"]
          # Each target repo's own renovate.json sets "enabled": false so
          # the hosted GitHub App skips it (avoiding duplicate PRs without
          # needing an org-level app-installation change). force takes
          # precedence over repo-level config, so this run still processes
          # them despite that flag.
          RENOVATE_FORCE: '{"enabled": true}'
          LOG_LEVEL: info
